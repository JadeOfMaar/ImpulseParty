@PART[impp_coreS?|impp_coreMk2]
{
	@MODULE[ModuleAnimationGroup]:NEEDS[Restock]
	{
		@name = ModuleRestockISRUAnimation
		needsEC = False
		waitForComplete = True
	}
	
	MODULE:NEEDS[CommunityResourcePack,!WBIResources]
	{
		name = ModuleResourceConverter
		ConverterName = Fusion Reactor
		StartActionName = Start Fusion Reactor
		StopActionName = Stop Fusion Reactor
		ToggleActionName = Toggle Fusion Reactor
		GeneratesHeat = False
		UseSpecialistBonus = False
		AutoShutdown = True
		DefaultShutoffTemp = 0.8
		// INPUT_RESOURCE
		// {
			// ResourceName = LqdDeuterium
			// Ratio = 0.726E-06
			// @Ratio *= #$/refCapacity$
		// }
		// INPUT_RESOURCE
		// {
			// ResourceName = LqdHe3
			// Ratio = 2.906E-06
			// @Ratio *= #$/refCapacity$
		// }
		INPUT_RESOURCE
		{
			ResourceName = FusionPellets
			Ratio = 1.34E-06
			@Ratio *= #$/refCapacity$
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 2400
			@Ratio *= #$/refCapacity$
			DumpExcess = False
		}
	}
	
	MODULE:NEEDS[WBIResources]
	{
		name = ModuleResourceConverter
		ConverterName = Fusion Reactor
		StartActionName = Start Fusion Reactor
		StopActionName = Stop Fusion Reactor
		ToggleActionName = Toggle Fusion Reactor
		GeneratesHeat = False
		UseSpecialistBonus = False
		AutoShutdown = True
		DefaultShutoffTemp = 0.8
		INPUT_RESOURCE
		{
			ResourceName = FusionPellets
			Ratio = 0.00147
			@Ratio *= #$/refCapacity$
		}
		// OUTPUT_RESOURCE
		// {
			// ResourceName = ElectricCharge
			// Ratio = 750
			// @Ratio *= #$/refCapacity$
			// DumpExcess = True
		// }
		OUTPUT_RESOURCE:NEEDS[WBIResources]
		{
			ResourceName = wbiElectroPlasma
			Ratio = 1400
			@Ratio *= #$/refCapacity$
		}
	}
	MODULE:NEEDS[WBIResources]
	{
		name = ModuleResourceConverter
		ConverterName = EPS Transformer
		IsActivated = True
		StartActionName = Start EPS Transformer
		StopActionName = Stop EPS Transformer
		ToggleActionName = Toggle EPS Transformer
		GeneratesHeat = False
		UseSpecialistBonus = False
		AutoShutdown = True
		DefaultShutoffTemp = 0.8
		INPUT_RESOURCE
		{
			ResourceName = wbiElectroPlasma
			Ratio = 140
			@Ratio *= #$/refCapacity$
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 2800
			@Ratio *= #$/refCapacity$
			DumpExcess = True
		}
	}
	MODULE:NEEDS[WBIResources]
	{
		name = ModuleResourceConverter
		ConverterName = EPS Decay
		AlwaysActive = True
		IsActivated = True
		GeneratesHeat = False
		UseSpecialistBonus = False
		INPUT_RESOURCE
		{
			ResourceName = wbiElectroPlasma
			Ratio = 140
			@Ratio *= #$/refCapacity$
		}
	}
	RESOURCE:NEEDS[WBIResources]
	{
		name = wbiElectroPlasma
		amount = 0
		maxAmount = 1400
		@maxAmount *= #$/refCapacity$
		isTweakable = false
	}
}

@PART[impp_nacNoseS0|impp_coreS1G]:NEEDS[Restock]
{
	@MODULE[ModuleAnimationGroup]
	{
		@name = ModuleRestockISRUAnimation
		needsEC = False
		waitForComplete = True
	}
}